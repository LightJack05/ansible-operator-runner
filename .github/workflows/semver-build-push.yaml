name: Release

on:
  push:
    branches:
      - main

jobs:
  semver:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    outputs:
      tag: ${{ steps.tag_version.outputs.new_tag }}
      version: ${{ steps.tag_version.outputs.new_version }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: false

      - name: Publish Release
        if: ${{ steps.tag_version.outputs.new_tag != '' }}
        uses: ncipollo/release-action@v1
        with:
          generateReleaseNotes: true
          tag: ${{ steps.tag_version.outputs.new_tag }}
          prerelease: true
          draft: false

  build-and-push:
    needs: semver
    if: ${{ needs.semver.outputs.tag != '' }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push init container image
        uses: docker/build-push-action@v7
        with:
          context: init/
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/lightjack05/ansible-operator-runner-init:${{ needs.semver.outputs.tag }}
            ghcr.io/lightjack05/ansible-operator-runner-init:latest

      - name: Build and push runner container image
        uses: docker/build-push-action@v7
        with:
          context: runner/
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/lightjack05/ansible-operator-runner-runner:${{ needs.semver.outputs.tag }}
            ghcr.io/lightjack05/ansible-operator-runner-runner:latest
